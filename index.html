<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Form</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1f3c42, #2f4f57);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .form-container {
      background: #2f4f57;
      padding: 40px;
      border-radius: 20px;
      width: 400px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }

    .form-container h2 {
      color: white;
      margin-bottom: 25px;
      text-align: center;
    }

    .input-group {
      margin-bottom: 15px;
    }

    .input-group label {
      display: block;
      color: #ddd;
      margin-bottom: 5px;
      font-size: 14px;
    }

    .input-group input,
    .input-group select {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      outline: none;
      font-size: 14px;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: #00e0b8;
      border: none;
      border-radius: 25px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.3s;
    }

    .submit-btn:hover {
      background: #00c9a7;
    }
  </style>
</head>

<body>

  <div class="form-container">
    <h2>Submit Requirement</h2>

    <!-- NETLIFY FORM START -->
    <form name="contact" method="POST" data-netlify="true">
      
      <!-- Important hidden input -->
      <input type="hidden" name="form-name" value="contact" />

      <div class="input-group">
        <label>Name</label>
        <input type="text" name="name" required>
      </div>

      <div class="input-group">
        <label>Company</label>
        <input type="text" name="company">
      </div>

      <div class="input-group">
        <label>Email</label>
        <input type="email" name="email" required>
      </div>

      <div class="input-group">
        <label>Mobile</label>
        <input type="text" name="mobile">
      </div>

      <div class="input-group">
        <label>City</label>
        <input type="text" name="city">
      </div>

      <div class="input-group">
        <label>Type of Document</label>
        <select name="document" required>
          <option value="">Select Type</option>
          <option value="Resume">Resume</option>
          <option value="Report">Report</option>
          <option value="Legal">Legal</option>
        </select>
      </div>

      <button type="submit" class="submit-btn">
        Submit Requirement
      </button>

    </form>
    <!-- NETLIFY FORM END -->

  </div>

</body>
</html>
